name: Web Quality

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  web-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Web CI checks
        run: npm run ci:web
